name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: .NET SDK einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MyMusic.slnx

      - name: Build
        run: dotnet build MyMusic.slnx --no-restore

      - name: Formatierung und Stil pruefen (dotnet format)
        run: dotnet format MyMusic.slnx --verify-no-changes --no-restore

      - name: Zeilenlaenge pruefen (max. 120 Zeichen)
        run: |
          set -e
          violations=$(grep -rnE '^.{121,}$' --include='*.cs' src tests \
            | grep -v '/bin/' | grep -v '/obj/' || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Zeilen mit mehr als 120 Zeichen gefunden (siehe oben)."
            exit 1
          fi

      - name: Unit Tests - Domain
        run: dotnet test tests/MyMusic.Domain.Tests/MyMusic.Domain.Tests.csproj --no-build

      - name: Unit Tests - Application
        run: dotnet test tests/MyMusic.Application.Tests/MyMusic.Application.Tests.csproj --no-build

      - name: Unit Tests - Api
        run: dotnet test tests/MyMusic.Api.Tests/MyMusic.Api.Tests.csproj --no-build

      # MyMusic.IntegrationTests laeuft hier bewusst nicht: der Test startet den vollen
      # Aspire-AppHost inkl. Docker-Container und braucht lokale User-Secrets. Siehe
      # docs/adr/0003-ci-gate-codequalitaet.md.
